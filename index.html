<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelajah Tata Surya - Media Pembelajaran Interaktif</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050b18;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animasi Bintang */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Background Stars Generator -->
    <div class="stars-container" id="stars"></div>
    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [stage, setStage] = useState('hero'); // 'hero', 'menu', 'materi', 'kuis'
            const [quizResult, setQuizResult] = useState(null);

            const CardJupiter = () => (
                <div className="glass-card p-8 rounded-[2.5rem] shadow-2xl border-l-8 border-yellow-400 animate-in fade-in slide-in-from-right duration-700 max-w-lg w-full">
                    <div className="flex items-center gap-4 mb-6">
                        <div className="text-6xl animate-pulse">🪐</div>
                        <div>
                            <h3 className="text-3xl font-extrabold text-yellow-400 uppercase tracking-tighter">Planet Jupiter</h3>
                            <p className="text-blue-300 text-sm font-semibold uppercase tracking-widest">Raksasa Gas</p>
                        </div>
                    </div>
                    <p className="text-gray-200 leading-relaxed text-lg mb-6">
                        Jupiter adalah <strong>planet terbesar</strong> di Tata Surya kita. Begitu besarnya, sehingga semua planet lain bisa dimasukkan ke dalamnya! 
                        Planet ini terkenal dengan "Bintik Merah Besar"-nya yang merupakan badai raksasa yang sudah berlangsung ratusan tahun.
                    </p>
                    <button 
                        onClick={() => setStage('menu')}
                        className="w-full py-4 bg-white/10 hover:bg-white/20 rounded-2xl font-bold transition-all border border-white/10 text-white"
                    >
                        Kembali ke Menu
                    </button>
                </div>
            );

            const Quiz = () => (
                <div className="glass-card p-10 rounded-[2.5rem] shadow-2xl border border-blue-500/30 text-center animate-in zoom-in duration-500 max-w-lg w-full">
                    <div className="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">⭐</div>
                    <h3 className="text-2xl font-bold text-white mb-8">Apakah planet terbesar di tata surya kita?</h3>
                    
                    <div className="space-y-4">
                        <button 
                            onClick={() => setQuizResult('wrong')}
                            className={`w-full py-5 rounded-2xl font-bold text-xl transition-all border-2 ${quizResult === 'wrong' ? 'bg-red-500/20 border-red-500 text-red-400' : 'bg-white/5 border-white/10 text-white hover:border-yellow-400'}`}
                        >
                            🌍 A. Bumi
                        </button>
                        <button 
                            onClick={() => setQuizResult('correct')}
                            className={`w-full py-5 rounded-2xl font-bold text-xl transition-all border-2 ${quizResult === 'correct' ? 'bg-green-500/20 border-green-500 text-green-400' : 'bg-white/5 border-white/10 text-white hover:border-yellow-400'}`}
                        >
                            🪐 B. Jupiter
                        </button>
                    </div>

                    {quizResult && (
                        <div className="mt-8 animate-bounce">
                            <p className={`text-2xl font-black ${quizResult === 'correct' ? 'text-green-400' : 'text-red-400'}`}>
                                {quizResult === 'correct' ? '✨ HEBAT! JAWABAN BENAR!' : '🚀 COBA LAGI YA!'}
                            </p>
                            <button onClick={() => {setStage('menu'); setQuizResult(null)}} className="mt-4 text-gray-400 underline font-medium">Menu Utama</button>
                        </div>
                    )}
                </div>
            );

            const AlurBelajar = () => (
                <div className="glass-card p-4 rounded-[2.5rem] shadow-2xl animate-in fade-in slide-in-from-bottom duration-700 max-w-2xl w-full">
                    <h3 className="text-2xl font-extrabold text-blue-400 mb-4 text-center uppercase tracking-tighter">🗺️ Alur & Bahan Kajian</h3>
                    <div className="rounded-2xl overflow-hidden border border-white/10 mb-6">
                        <img src="gambar.jpg" alt="Alur Belajar" className="w-full h-auto" />
                    </div>
                    <button 
                        onClick={() => setStage('menu')}
                        className="w-full py-4 bg-white/10 hover:bg-white/20 rounded-2xl font-bold transition-all border border-white/10 text-white"
                    >
                        Kembali ke Menu
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-6 relative z-10 text-white selection:bg-yellow-400 selection:text-black">
                    
                    {stage === 'hero' && (
                        <div className="text-center max-w-2xl animate-in fade-in zoom-in duration-1000">
                            <div className="text-8xl mb-6 animate-float inline-block">🚀</div>
                            <h1 className="text-6xl md:text-7xl font-extrabold mb-4 tracking-tighter bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent">
                                Jelajah Tata Surya
                            </h1>
                            <p className="text-xl md:text-2xl text-gray-400 mb-10 font-light max-w-md mx-auto">
                                Temukan rahasia menakjubkan di balik planet-planet tetangga kita!
                            </p>
                            <button 
                                onClick={() => setStage('menu')}
                                className="group relative px-12 py-5 bg-yellow-400 text-black font-black text-2xl rounded-full shadow-[0_0_30px_rgba(250,204,21,0.4)] hover:shadow-[0_0_50px_rgba(250,204,21,0.7)] transition-all transform hover:scale-110 active:scale-95"
                            >
                                Mulai Belajar
                                <span className="absolute inset-0 rounded-full border-4 border-yellow-200/50 scale-125 opacity-0 group-hover:opacity-100 transition-all duration-500"></span>
                            </button>
                        </div>
                    )}

                    {stage === 'menu' && (
                        <div className="flex flex-col md:flex-row gap-6 w-full max-w-3xl animate-in slide-in-from-bottom-10 duration-700">
                            <button 
                                onClick={() => setStage('materi')}
                                className="flex-1 p-8 glass-card rounded-[3rem] hover:bg-blue-600 transition-all transform hover:-translate-y-4 group"
                            >
                                <div className="text-5xl mb-4 group-hover:scale-125 transition-transform">📖</div>
                                <h4 className="text-xl font-bold">Baca Materi</h4>
                                <p className="text-gray-400 text-xs mt-2 group-hover:text-white">Pelajari fakta planet</p>
                            </button>
                            <button 
                                onClick={() => setStage('alur')}
                                className="flex-1 p-8 glass-card rounded-[3rem] hover:bg-emerald-600 transition-all transform hover:-translate-y-4 group"
                            >
                                <div className="text-5xl mb-4 group-hover:scale-125 transition-transform">🗺️</div>
                                <h4 className="text-xl font-bold">Alur Belajar</h4>
                                <p className="text-gray-400 text-xs mt-2 group-hover:text-white">Bahan kajian utama</p>
                            </button>
                            <button 
                                onClick={() => setStage('kuis')}
                                className="flex-1 p-8 glass-card rounded-[3rem] hover:bg-purple-600 transition-all transform hover:-translate-y-4 group"
                            >
                                <div className="text-5xl mb-4 group-hover:scale-125 transition-transform">❓</div>
                                <h4 className="text-xl font-bold">Uji Kuis</h4>
                                <p className="text-gray-400 text-xs mt-2 group-hover:text-white">Asah kemampuanmu</p>
                            </button>
                        </div>
                    )}

                    {stage === 'materi' && <CardJupiter />}
                    {stage === 'alur' && <AlurBelajar />}
                    {stage === 'kuis' && <Quiz />}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
